name: Release

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version - in the form of v1.2.3"
        required: true
        type: string

env:
  BINARY_NAME: MyceliumVR

permissions:
  contents: write

jobs:
  get-version:
    runs-on: ubuntu-latest
    steps:
      - name: Get tag
        id: tag
        run: echo "tag=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
    outputs:
      version: ${{ inputs.version || steps.tag.outputs.tag }}

  build-windows:
    runs-on: windows-latest
    needs: get-version
    env:
      VERSION: ${{ needs.get-version.outputs.version }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: windows-release-${{ hashFiles('**/Cargo.toml') }}
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: stable
          targets: x86_64-pc-windows-msvc
      - name: Build release
        run: cargo build --profile dist --target x86_64-pc-windows-msvc
      - name: Prepare release
        shell: bash
        run: |
          mkdir -p staging
          cp "target/x86_64-pc-windows-msvc/dist/${{ env.BINARY_NAME }}.exe" staging/
          cp -r assets staging/ 2>/dev/null || true
          cp LICENSE staging/
          cp README.md staging/
      - name: Zip release
        uses: vimtor/action-zip@v1.1
        with:
          files: staging/
          dest: ${{ env.BINARY_NAME }}_windows_x86_64.zip
      - name: Upload release
        uses: svenstaro/upload-release-action@v2
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          file: ${{ env.BINARY_NAME }}_windows_x86_64.zip
          asset_name: ${{ env.BINARY_NAME }}_${{ env.VERSION }}_windows_x86_64.zip
          release_name: ${{ env.VERSION }}
          tag: ${{ env.VERSION }}
          overwrite: true

  build-linux-x86_64:
    runs-on: ubuntu-latest
    needs: get-version
    env:
      VERSION: ${{ needs.get-version.outputs.version }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: linux-x86_64-release-${{ hashFiles('**/Cargo.toml') }}
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: stable
          targets: x86_64-unknown-linux-gnu
      - name: Install linux dependencies
        run: sudo apt-get update; sudo apt-get install -y g++ pkg-config libx11-dev libasound2-dev libudev-dev libxkbcommon-x11-0 libwayland-dev libxkbcommon-dev
      - name: Build release
        run: cargo build --profile dist --target x86_64-unknown-linux-gnu
      - name: Prepare and bundle release
        run: |
          chmod +x "target/x86_64-unknown-linux-gnu/dist/${{ env.BINARY_NAME }}"
          cp "target/x86_64-unknown-linux-gnu/dist/${{ env.BINARY_NAME }}" .
          tar -czf "${{ env.BINARY_NAME }}_linux_x86_64.tar.gz" "${{ env.BINARY_NAME }}" assets/ LICENSE README.md 2>/dev/null || \
          tar -czf "${{ env.BINARY_NAME }}_linux_x86_64.tar.gz" "${{ env.BINARY_NAME }}" LICENSE README.md
      - name: Upload release
        uses: svenstaro/upload-release-action@v2
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          file: ${{ env.BINARY_NAME }}_linux_x86_64.tar.gz
          asset_name: ${{ env.BINARY_NAME }}_${{ env.VERSION }}_linux_x86_64.tar.gz
          release_name: ${{ env.VERSION }}
          tag: ${{ env.VERSION }}
          overwrite: true

  build-linux-aarch64:
    runs-on: ubuntu-latest
    needs: get-version
    env:
      VERSION: ${{ needs.get-version.outputs.version }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: linux-aarch64-release-${{ hashFiles('**/Cargo.toml') }}
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: stable
          targets: aarch64-unknown-linux-gnu
      - name: Install cross-compilation dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y g++-aarch64-linux-gnu pkg-config libx11-dev libasound2-dev libudev-dev libxkbcommon-x11-0 libwayland-dev libxkbcommon-dev
      - name: Build release
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc
          PKG_CONFIG_SYSROOT_DIR: /usr/aarch64-linux-gnu
        run: cargo build --profile dist --target aarch64-unknown-linux-gnu
      - name: Prepare and bundle release
        run: |
          cp "target/aarch64-unknown-linux-gnu/dist/${{ env.BINARY_NAME }}" .
          tar -czf "${{ env.BINARY_NAME }}_linux_aarch64.tar.gz" "${{ env.BINARY_NAME }}" assets/ LICENSE README.md 2>/dev/null || \
          tar -czf "${{ env.BINARY_NAME }}_linux_aarch64.tar.gz" "${{ env.BINARY_NAME }}" LICENSE README.md
      - name: Upload release
        uses: svenstaro/upload-release-action@v2
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          file: ${{ env.BINARY_NAME }}_linux_aarch64.tar.gz
          asset_name: ${{ env.BINARY_NAME }}_${{ env.VERSION }}_linux_aarch64.tar.gz
          release_name: ${{ env.VERSION }}
          tag: ${{ env.VERSION }}
          overwrite: true

